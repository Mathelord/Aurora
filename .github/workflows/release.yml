name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Build Linux portable archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"
      - name: Build and test
        run: gradle --no-daemon clean build
      - name: Package application
        run: gradle --no-daemon appImage
      - name: Create archive
        run: tar -C build/jpackage -czf build/Aurora-Linux-x64.tar.gz Aurora
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-linux
          path: build/Aurora-Linux-x64.tar.gz
          if-no-files-found: error

  windows:
    name: Build Windows portable archive
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"
      - name: Build and test
        run: gradle --no-daemon clean build
      - name: Package application
        run: gradle --no-daemon windowsPortable
      - name: Create archive
        shell: pwsh
        run: Compress-Archive -Path build/windows-portable/Aurora -DestinationPath build/Aurora-Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-windows
          path: build/Aurora-Windows-x64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
